name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install black pylint mypy pytest pytest-cov

      - name: Check formatting with black
        run: black --check src/stelion/ tests/

      - name: Lint with pylint
        run: pylint --rcfile=config/tools/pylintrc.ini src/stelion/

      - name: Type check with mypy
        run: mypy --config-file config/tools/mypy.ini src/

      - name: Run tests with pytest
        run: pytest tests/ -v --cov=stelion --cov-report=xml
